name: 🤖 Multi-Agent Code Analysis

# Triggers: run on every PR and on manual dispatch
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      format:
        description: "Output format (markdown | html)"
        required: false
        default: "markdown"

permissions:
  contents: read
  pull-requests: write   # needed to post the PR comment

jobs:
  analyze-and-explain:
    name: Analyze repo & generate plain-English report
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ──────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Create outputs directory ────────────────────────────────────
      - name: Create outputs directory
        run: mkdir -p outputs

      # ── 4. Run Agent 1 — Repository Analyzer ──────────────────────────
      - name: "[Agent 1] Analyze repository structure"
        run: |
          node agents/agent1_analyzer.js \
            --repo . \
            --out outputs/arch_context.json

      # ── 5. Run Agent 2 — Plain-English Explainer ──────────────────────
      - name: "[Agent 2] Generate plain-English explanation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORMAT=${{ github.event.inputs.format || 'markdown' }}
          node agents/agent2_explainer.js \
            --context outputs/arch_context.json \
            --out outputs/explanation.md \
            --format $FORMAT

      # ── 6. Post explanation as PR comment ──────────────────────────────
      - name: Post analysis as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read both outputs
            const ctx = JSON.parse(fs.readFileSync('outputs/arch_context.json', 'utf8'));
            const explanation = fs.readFileSync('outputs/explanation.md', 'utf8');

            // Build the comment body
            const body = [
              '## 🤖 Multi-Agent Architecture Analysis',
              '',
              `> **Repository:** \`${ctx.repo_name}\``,
              `> **Pattern:** ${ctx.architecture_pattern}`,
              `> **Stack:** ${ctx.tech_stack?.join(', ')}`,
              `> **Components found:** ${ctx.components?.length || 0}`,
              '',
              '---',
              '',
              explanation.slice(0, 5000),  // GitHub comments have a size limit
              '',
              '---',
              '_Generated by [Multi-Agent Copilot Pipeline](.github/workflows/analyze.yml)_'
            ].join('\n');

            await github.rest.issues.createComment({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ── 7. Upload outputs as artifacts ────────────────────────────────
      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: architecture-analysis
          path: |
            outputs/arch_context.json
            outputs/explanation.md
          retention-days: 30
